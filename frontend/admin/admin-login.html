<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login - MILMICH FX Academy</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#13294b}
.card{background:#fff;width:360px;padding:30px;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
h2{text-align:center;color:#13294b}
label{display:block;margin-top:14px;font-weight:bold}
input{width:100%;padding:10px;margin-top:6px}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-size:14px}
button{width:100%;padding:12px;margin-top:18px;background:#13294b;color:#fff;border:none;border-radius:6px;cursor:pointer}
#msg{margin-top:15px;text-align:center}
</style>
</head>
<body>
<div class="card">
<h2>Admin Login</h2>
<form id="loginForm">
<label>Email</label>
<input type="email" id="email" required placeholder="admin@example.com">
<label>Password</label>
<input type="password" id="password" required placeholder="Password">
<div class="row">
<label><input type="checkbox" id="show"> Show Password</label>
</div>
<button type="submit">Login</button>
<div id="msg"></div>
</form>
</div>
<script>
const loginForm = document.getElementById("loginForm");
const email = document.getElementById("email");
const password = document.getElementById("password");
const show = document.getElementById("show");
const msg = document.getElementById("msg");

// Show / Hide Password
show.addEventListener("change", () => {
  password.type = show.checked ? "text" : "password";
});

// Login
loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  msg.style.color = "black";
  msg.textContent = "Signing in...";

  try {
    const res = await fetch("https://fx-academy-backend.onrender.com", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        email: email.value,
        password: password.value,
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      msg.style.color = "red";
      msg.textContent = data.message || "Login failed";
      return;
    }

    // ONLY ADMINS CAN LOGIN HERE
    if (data.user.role !== "admin") {
      msg.style.color = "red";
      msg.textContent = "Access denied. Admin only.";
      return;
    }

    // Save token
   localStorage.setItem("token", data.token);

    // Save admin info
    localStorage.setItem("admin", JSON.stringify(data.user));

    msg.style.color = "green";
    msg.textContent = "Login successful. Redirecting...";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } catch (err) {
    console.error(err);
    msg.style.color = "red";
    msg.textContent = "Cannot connect to backend.";
  }
});
</script>
</body>
</html>
