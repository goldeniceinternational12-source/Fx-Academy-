<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Material Requests</title>
<style>
body{margin:0;font-family:Arial;background:#eef2f7}
header{background:#13294b;color:#fff;padding:18px}
.container{padding:20px}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:12px;border:1px solid #ddd;text-align:left}
th{background:#13294b;color:#fff}
.badge{padding:4px 8px;border-radius:4px;color:#fff}
.pending{background:#f39c12}.processing{background:#3498db}.completed{background:#27ae60}
button{padding:8px 12px;margin-right:5px;border:none;border-radius:4px;cursor:pointer}
.view{background:#13294b;color:#fff}.delete{background:#c0392b;color:#fff}
#details{display:none;margin-top:20px;background:#fff;padding:20px;border-radius:8px}
</style></head>
<body>
<header><h2>MILMICH FX Academy - Material Requests</h2></header>
<div class="container">
<table>
<thead><tr><th>Name</th><th>Email</th><th>Request</th><th>Status</th><th>Action</th></tr></thead>
<tbody id="requestsBody">
<tr>
<td>Loading...</td><td>-</td><td>-</td><td><span class="badge pending">Pending</span></td>
<td><button class="view" onclick="showDetails('Loading User','user@example.com','Sample request','Pending')">View</button></td>
</tr>
</tbody>
</table>

<div id="details">
<h3>Request Details</h3>
<p><strong>Name:</strong> <span id="dName"></span></p>
<p><strong>Email:</strong> <span id="dEmail"></span></p>
<p><strong>Requested Material:</strong> <span id="dRequest"></span></p>
<p><strong>Status:</strong> <span id="dStatus"></span></p>
<button onclick="alert('Backend update will be connected later.')">Mark Processing</button>
<button onclick="alert('Backend update will be connected later.')">Mark Completed</button>
<button class="delete" onclick="alert('Backend delete will be connected later.')">Delete</button>
</div>
</div>
<script>
function showDetails(name,email,request,status){
document.getElementById('details').style.display='block';
dName.textContent=name;
dEmail.textContent=email;
dRequest.textContent=request;
dStatus.textContent=status;
}
// Later connect:
// fetch('https://fx-academy-backend-v2.onrender.com/api/admin/material-requests')
</script>
</body></html>
