<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MILMICH FX Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
display:flex;
min-height:100vh;
}

/* ===========================
SIDEBAR
=========================== */

.sidebar{
width:250px;
background:#13294b;
color:#fff;
padding:25px;
min-height:100vh;
position:fixed;
left:0;
top:0;
}

.sidebar h2{
text-align:center;
margin-bottom:35px;
font-size:26px;
font-weight:700;
}

.sidebar a{
display:block;
color:#fff;
text-decoration:none;
padding:14px 16px;
margin-bottom:10px;
border-radius:8px;
transition:.25s;
}

.sidebar a:hover,
.sidebar a.active{
background:#1f4f82;
}

/* ===========================
MAIN
=========================== */

.main{
margin-left:250px;
flex:1;
padding:30px;
}

/* ===========================
TOP BAR
=========================== */

.top{
display:flex;
justify-content:space-between;
align-items:center;
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
margin-bottom:25px;
}

.top h1{
font-size:30px;
color:#13294b;
}

.top p{
color:#777;
margin-top:5px;
}

button{
background:#13294b;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
transition:.25s;
font-size:14px;
}

button:hover{
transform:translateY(-2px);
}

/* ===========================
CARDS
=========================== */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#fff;
padding:22px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
font-size:15px;
color:#777;
margin-bottom:12px;
}

.num{
font-size:38px;
font-weight:bold;
color:#13294b;
}

/* ===========================
CHARTS
=========================== */

.charts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
margin-top:30px;
}

.chart-card{
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.chart-card h3{
margin-bottom:15px;
color:#13294b;
}

/* ===========================
TABLE
=========================== */

.table{
margin-top:30px;
background:#fff;
padding:20px;
border-radius:14px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#13294b;
color:white;
}

th,td{
padding:14px;
border-bottom:1px solid #eee;
text-align:left;
}

tbody tr:hover{
background:#f5f7ff;
}

/* ===========================
STATUS
=========================== */

.status{
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:600;
color:white;
}

.pending{
background:#f39c12;
}

.processing{
background:#3498db;
}

.completed{
background:#27ae60;
}

/* ===========================
RESPONSIVE
=========================== */

@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
position:relative;
width:100%;
min-height:auto;
}

.main{
margin-left:0;
padding:20px;
}

.top{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

}

</style>

</head>

<body>
    <div class="sidebar">

    <h2>MILMICH FX</h2>

    <a href="#" class="active">🏠 Dashboard</a>
    <a href="material-requests.html">📚 Material Requests</a>
    <a href="payments.html">💳 Payment Proofs</a>
    <a href="users.html">👥 Users</a>
    <a href="settings.html">⚙️ Settings</a>
    <a href="#" id="logout">🚪 Logout</a>

</div>

<div class="main">

    <!-- ===========================
         TOP BAR
    ============================ -->

    <div class="top">

        <div>

            <h1>Welcome, Admin 👋</h1>

            <p id="todayDate"></p>

            <p id="lastUpdated"></p>

        </div>

        <button id="notifyBtn">
            🔔 Notifications
        </button>

    </div>

    <!-- ===========================
         DASHBOARD CARDS
    ============================ -->

    <div class="cards">

        <div class="card">
            <h3>Total Users</h3>
            <div class="num" id="users">0</div>
        </div>

        <div class="card">
            <h3>Material Requests</h3>
            <div class="num" id="requests">0</div>
        </div>

        <div class="card">
            <h3>Pending Requests</h3>
            <div class="num" id="pending">0</div>
        </div>

        <div class="card">
            <h3>Completed Requests</h3>
            <div class="num" id="completed">0</div>
        </div>

    </div>

    <!-- ===========================
         CHARTS
    ============================ -->

    <div class="charts">

        <div class="chart-card">

            <h3>📈 Users Growth</h3>

            <canvas id="usersChart"></canvas>

        </div>

        <div class="chart-card">

            <h3>🥧 Payment Status</h3>

            <canvas id="paymentsChart"></canvas>

        </div>

    </div>

    <!-- ===========================
         RECENT REQUESTS
    ============================ -->

    <div class="table">

        <h2>Recent Material Requests</h2>

        <br>

        <table>

            <thead>

                <tr>

                    <th>Name</th>
                    <th>Email</th>
                    <th>Request</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="tbody">

                <tr>

                    <td colspan="4">
                        Loading...
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="https://fx-academy-backend.onrender.com/socket.io/socket.io.js"></script>

<script src="./dashboard-part1.js"></script>
<script src="./dashboard-part2.js"></script>
</body>
</html>
